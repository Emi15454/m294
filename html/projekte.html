<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer Portfolio | Projekte</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="logo">[Mein Name] <span>| Developer</span></div>
        <nav aria-label="Hauptnavigation">
          <ul class="nav-list">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li>
              <a
                href="projekte.html"
                class="nav-link active"
                aria-current="page"
                >Projekte</a
              >
            </li>
            <li><a href="kontakt.html" class="nav-link">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container section-spacing">
      <h1 style="margin-bottom: var(--space-md)" class="title-projects">
        Projekt-Archiv
      </h1>
      <ul class="filter-bar" role="tablist" aria-label="Projekte filtern">
        <li>
          <button
            class="filter-pill active"
            data-filter="all"
            role="tab"
            aria-selected="true"
          >
            Alle
          </button>
        </li>
        <li>
          <button
            class="filter-pill"
            data-filter="ui-ux"
            role="tab"
            aria-selected="false"
          >
            UI/UX
          </button>
        </li>
        <li>
          <button
            class="filter-pill"
            data-filter="engineering"
            role="tab"
            aria-selected="false"
          >
            Engineering
          </button>
        </li>
        <li>
          <button
            class="filter-pill"
            data-filter="architecture"
            role="tab"
            aria-selected="false"
          >
            Architecture
          </button>
        </li>
      </ul>
      <div class="project-grid" data-display="all"></div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-inner">
          <div class="footer-col">
            <h4>Navigation</h4>
            <ul class="footer-links">
              <li><a href="index.html">Home</a></li>
              <li><a href="projekte.html">Projekte</a></li>
              <li><a href="kontakt.html">Contact</a></li>
            </ul>
          </div>
          <div class="footer-col">
            <h4>Socials</h4>
            <ul class="footer-links">
              <li><a href="#" target="_blank" rel="noopener">GitHub</a></li>
              <li><a href="#" target="_blank" rel="noopener">LinkedIn</a></li>
            </ul>
          </div>
          <div class="footer-col">
            <h4>Rechtliches</h4>
            <ul class="footer-links">
              <li><a href="#">Impressum</a></li>
              <li><a href="#">Datenschutz</a></li>
            </ul>
          </div>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2026 [Mein Name]. Clean Semantic Code.</p>
        </div>
      </div>
    </footer>
  </body>
  <script src="../js/main.js"></script>
</html>
